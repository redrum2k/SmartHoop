# Source
source: 0  # webcam (0) or path to video file

# Detection
model: yolov8n.pt
custom_model_path: null
ball_class_id: 32
confidence_threshold: 0.20
inference_size: 640
infer_every_n_frames: 1  # 1 = every frame; 2+ = skip and interpolate
use_hsv_fallback: false

# HSV fallback (when use_hsv_fallback: true)
hue_low: 0
hue_high: 25
hue_low2: 155  # red wraps around in HSV; lowered to catch orange-red
hue_high2: 180
sat_min: 100
val_min: 100

# Tracking
max_occlusion_frames: 5
history_sec: 1.5
use_kalman: false
association_max_distance: 80

# Zones (loaded from zones.json after calibration)
# hoop_zone, backboard_zone, attempt_roi

# Classification
K_hit_frames: 2
K_backboard_frames: 2
T_end_sec: 3.0
cooldown_sec: 1.0
downward_velocity_threshold: 50  # pixels/sec
T_hit_max_sec: 2.0  # max time from attempt start to confirm hit

# Performance
attempt_roi_crop: null  # [x, y, w, h] to crop before inference

# Hardware dispatch
dispatch_enabled: false  # set true when Pico W and Pi 5 are connected
devices:
  pico_hoop:
    ip: "192.168.1.XXX"   # fill in: IP of Pico W at the hoop
    port: 80
  pi5:
    ip: "192.168.1.XXX"   # fill in: IP of Raspberry Pi 5
    port: 5000
    # NOTE: devices/pico_chair.py also has PI5_IP/PI5_PORT hardcoded as MicroPython constants.
    # If you change the Pi 5 IP, update both this file AND re-flash pico_chair.py.
